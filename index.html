<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lista de Compras - Excel das Receitas By Ana</title>

<style>

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#f4f4f4;
    margin:40px;
}

.container{
    max-width:1100px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

h1{
    text-align:center;
    color:#2E7D32;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:25px;
}

th{
    background:#2E7D32;
    color:white;
    padding:12px;
}

td{
    padding:10px;
    border-bottom:1px solid #ddd;
}

tr:nth-child(even){
    background:#f7f7f7;
}

</style>

</head>

<body>

<div class="container">

<h1>🛒 Lista de Compras</h1>

<table id="tabelaCompras">

<thead>

<tr>
<th>ID Ingrediente</th>
<th>Ingrediente</th>
<th>Quantidade</th>
<th>Unidade</th>
<th>Secção</th>
</tr>

</thead>

<tbody>

</tbody>

</table>

</div>

<script>

const sheetID="ID_DA_TUA_FOLHA";

const sheetName="Lista de Compras";

const url=`https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?sheet=${encodeURIComponent(sheetName)}`;

fetch(url)
.then(res=>res.text())
.then(rep=>{

const json=JSON.parse(rep.substr(47).slice(0,-2));

const rows=json.table.rows;

const tbody=document.querySelector("#tabelaCompras tbody");

tbody.innerHTML="";

rows.forEach((row,index)=>{

// Ignora as primeiras linhas do cabeçalho
if(index<3) return;

if(!row.c) return;

tbody.innerHTML+=`

<tr>

<td>${row.c[0]?.v ?? ""}</td>

<td>${row.c[1]?.v ?? ""}</td>

<td>${row.c[2]?.v ?? ""}</td>

<td>${row.c[3]?.v ?? ""}</td>

<td>${row.c[4]?.v ?? ""}</td>

</tr>

`;

});

});

</script>

</body>
</html>
